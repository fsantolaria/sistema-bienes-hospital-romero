{% extends "base.html" %}
{% load static %}

{% block title %}Panel de Administración - Sistema de Bienes Patrimoniales{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/home_admin.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
{% endblock %}

{% block content %}

<!-- Contenedor principal -->
<main class="main-container">
    <!-- Panel lateral izquierdo -->
    <aside class="left-panel">
        <img src="{% static 'img/diseno-izquierda.png' %}" alt="Gobierno de Buenos Aires" class="panel-image">
    </aside>

    <!-- Área central -->
    <section class="home-content">
        <div class="menu-buttons">
            <!-- Botón Bienes Patrimoniales -->
            <a href="{% url 'bienes' %}" class="menu-button">
                <i class="fas fa-table-cells-large card-icon"></i>
                Bienes Patrimoniales
            </a>
            
            <!-- Botón Usuarios -->
            <a href="{% url 'alta_operadores' %}" class="menu-button">
                <i class="fas fa-users card-icon"></i>
                Usuarios
            </a>

            <!-- Botón Reportes -->
            <a href="{% url 'reportes' %}" class="menu-button">
                <i class="fas fa-chart-line card-icon"></i>
                Reportes
            </a>
        </div>
    </section>
</main>

<footer class="footer"></footer>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/home_admin.js' %}"></script>
{% endblock %}
