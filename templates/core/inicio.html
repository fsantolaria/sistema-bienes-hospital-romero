{% extends 'base.html' %}
{% load static %}

{% block title %}Inicio - Sistema de Patrimonio{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/inicio.css' %}">
{% endblock %}

{% block content %}
<!-- Fondos laterales -->
<img src="{% static 'img/lateral-izquierda.png' %}" alt="Decoración izquierda" class="lateral izquierda">
<img src="{% static 'img/lateral-derecha.png' %}" alt="Decoración derecha" class="lateral derecha">

<!-- Contenedor principal -->
<div class="login-container">
    <div class="logo-container">
        <!-- Logo -->
        <img class="logo" src="{% static 'img/logo.png' %}" alt="Logo del Sistema de Patrimonio">
    </div>
    
    <h1 class="title">Sistema<br>Gestión de Patrimonio</h1>
    <p class="subtitle">Inicia sesión como</p>
    
    <div class="login-options">
    <a href="{% url 'login' %}?tipo=admin" class="login-button">
        <i class="fas fa-user-cog"></i> Administrador
    </a>
    <a href="{% url 'login' %}?tipo=supervisor" class="login-button">
        <i class="fas fa-eye"></i> Supervisor
    </a>
    <a href="{% url 'login' %}?tipo=empleado" class="login-button">
        <i class="fas fa-user"></i> Usuario
    </a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/inicio.js' %}"></script>
{% endblock %}
